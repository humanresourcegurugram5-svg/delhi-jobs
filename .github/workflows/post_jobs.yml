name: Delhi Jobs Auto Poster

on:
  schedule:
    - cron: '30 6 * * *'   # 12:00 PM IST
    - cron: '30 9 * * *'   # 3:00 PM IST
    - cron: '30 12 * * *'  # 6:00 PM IST
    - cron: '30 15 * * *'  # 9:00 PM IST
  workflow_dispatch:

jobs:
  post-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Clear old fonts
        run: rm -rf fonts/

      - name: Configure git
        run: |
          git config user.email "bot@delhigurugramjobs.com"
          git config user.name "Delhi Jobs Bot"

      - name: Run bot
        env:
          JSEARCH_KEY:     ${{ secrets.JSEARCH_KEY }}
          ADZUNA_APP_ID:   ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:  ${{ secrets.ADZUNA_APP_KEY }}
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          IMGBB_KEY:       ${{ secrets.IMGBB_KEY }}
          TWILIO_SID:      ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN:    ${{ secrets.TWILIO_TOKEN }}
          YOUR_WHATSAPP:   ${{ secrets.YOUR_WHATSAPP }}
          GITHUB_TOKEN:    ${{ secrets.GITHUB_TOKEN }}
        run: python main.py
